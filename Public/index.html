<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chef's Rage - Brigade Solidaire</title>
    <style>
        body {
            margin: 0;
            background-color: #2c3e50;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;

        canvas {
            background-color: #87CEEB;

        #ui { margin-top: 10px; text-align: center; }

<body>


    
    <canvas id="ecranDeJeu" width="850" height="600"></canvas>

    <div id="ui">
        <p>Contrôles : <span class="key">Z Q D</span> ou <span class="key">Flèches</span> | Action : <span class="key">E</span></p>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    
    <script type="module" src="main.js"></script>

</html>
